version: '3.8'

services:
  api:
    build: .
    container_name: muuboi_api
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Database=MuuBoiDb;User=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;
      - Jwt__Key=MuuBoi_ChaveSuperSecreta_MinimoDe32Caracteres_2024!
    depends_on:
      - db

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: muuboi_db
    environment:
      - SA_PASSWORD=YourStrong!Passw0rd
      - ACCEPT_EULA=Y
    ports:
      - "1433:1433"